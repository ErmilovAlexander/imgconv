version: 2

project_name: imgconv

before:
  hooks:
    - go mod tidy

builds:
  - id: imgconv
    main: ./cmd/imgconv
    binary: "{{ .ProjectName }}_v{{ .Version }}"
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: imgconv
    builds:
      - imgconv
    format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: LICENSE*
      - src: README*

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  extra_files:
    - glob: imgconv-manifest.json
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"

signs:
  - artifacts: checksum
    cmd: gpg
    args:
      - "--batch"
      - "--yes"
      - "--detach-sign"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "${artifact}"

release:
  github:
    owner: ErmilovAlexander
    name: imgconv
  draft: false
  prerelease: false
  extra_files:
    - glob: imgconv-manifest.json
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"
